services:
  mosiac-identity:
    build:
      context: ..
      dockerfile: oci/Dockerfile
    image: mosiac-identity:latest
    container_name: mosiac-identity
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - MOSIAC_PORT=3002
      - MOSIAC_DATA_DIR=/data
      - MOSIAC_RP_ID=localhost
      - MOSIAC_ORIGIN=http://localhost:3002
    volumes:
      - mosiac-data:/data

volumes:
  mosiac-data:
